services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "BlindMatch@123"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'BlindMatch@123' -Q 'SELECT 1' -b -No"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=BlindMatchDb;User Id=sa;Password=BlindMatch@123;TrustServerCertificate=True;MultipleActiveResultSets=true"
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

volumes:
  sqldata:
